<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8ec9ff">
<title>ASTRARI 3D — Echoes of the Verdant Stars</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#8ec9ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  /* crosshair */
  #cross{position:fixed;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px;z-index:5;pointer-events:none;opacity:.8;}
  #cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.85);box-shadow:0 0 2px rgba(0,0,0,.6);}
  #cross::before{left:8px;top:2px;width:2px;height:14px;}
  #cross::after{top:8px;left:2px;height:2px;width:14px;}
  /* HUD */
  #hud{position:fixed;top:calc(10px + env(safe-area-inset-top));left:12px;z-index:6;color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.7);font-size:12px;font-weight:600;line-height:1.5;pointer-events:none;}
  #hud b{color:#ffe08a;}
  #biome{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:6;
    color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);font-size:14px;font-weight:800;letter-spacing:.5px;opacity:0;transition:opacity .5s;}
  #biome.show{opacity:1;}
  /* mobile move stick */
  #stick{position:fixed;left:0;bottom:0;width:46%;height:46%;z-index:7;display:none;}
  #knob{position:absolute;width:64px;height:64px;margin:-32px 0 0 -32px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.5),rgba(255,255,255,.18));border:2px solid rgba(255,255,255,.6);
    opacity:0;transition:opacity .15s;pointer-events:none;}
  #ring{position:absolute;width:108px;height:108px;margin:-54px 0 0 -54px;border-radius:50%;border:2px solid rgba(255,255,255,.3);opacity:0;transition:opacity .15s;pointer-events:none;}
  /* jump / interact buttons (mobile) */
  .fab{position:fixed;z-index:7;right:18px;width:62px;height:62px;border-radius:50%;display:none;
    align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#08263a;
    background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.95),rgba(180,220,255,.85));
    border:2px solid rgba(255,255,255,.7);box-shadow:0 4px 14px rgba(0,0,0,.35);user-select:none;}
  #fab-jump{bottom:calc(120px + env(safe-area-inset-bottom));}
  #fab-act{bottom:calc(40px + env(safe-area-inset-bottom));background:radial-gradient(circle at 40% 35%,#ffe9a8,#ffce6a);}
  .fab:active{transform:scale(.9);}
  #lock-msg{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
    background:rgba(6,14,24,.55);color:#fff;text-align:center;cursor:pointer;backdrop-filter:blur(2px);}
  #lock-msg h1{font-size:20px;letter-spacing:1px;color:#ffe08a;text-shadow:0 2px 8px rgba(0,0,0,.6);}
  #lock-msg p{font-size:13px;opacity:.9;max-width:300px;line-height:1.6;}
  #lock-msg .play{margin-top:10px;padding:11px 26px;border-radius:24px;background:linear-gradient(180deg,#ffe08a,#f3b24a);color:#3a2a08;font-weight:800;border:none;font-size:15px;}
  #loading{position:fixed;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;background:#0c1622;color:#9fc8e8;font-size:14px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cross"></div>
<div id="hud"></div>
<div id="biome"></div>
<div id="stick"><div id="ring"></div><div id="knob"></div></div>
<div id="fab-jump" class="fab">JUMP</div>
<div id="fab-act" class="fab">✦</div>
<div id="lock-msg">
  <h1>ASTRARI · First Person</h1>
  <p id="lock-sub">Click to look around. <b>WASD / arrows</b> to move, <b>Space</b> to jump, <b>E</b> to interact.</p>
  <button class="play">Enter the Verdant Stars</button>
</div>
<div id="loading">Shaping the isles…</div>
<script type="module" src="/src3d/main.js"></script>
</body>
</html>
