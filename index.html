<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASTRARI">
<meta name="theme-color" content="#04060c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ASTRARI — Echoes of the Verdant Stars</title>
</head>
<body>
<div id="phone">
  <canvas id="game"></canvas>

  <div id="top">
    <div id="toprow">
      <div id="res">
        <div class="res"><span class="ic" style="background:#3a2d12;color:var(--gold)">◈</span><span id="r-astral">0</span></div>
        <div class="res"><span class="ic" style="background:#13324d;color:var(--rare)">✦</span><span id="r-shard">0</span></div>
        <div class="res"><span class="ic" style="background:#33260f;color:#d9a05b">⛁</span><span id="r-ore">0</span></div>
        <div class="res"><span class="ic" style="background:#1f3318;color:#9bd66a">🪵</span><span id="r-wood">0</span></div>
      </div>
      <div id="envbox"><b id="env-time">Dawn</b><br><span id="env-weather">Clear</span><br><span id="env-day">Day 1</span></div>
    </div>
    <div id="wardenbar"><span class="lvl" id="w-lvl">Lv 1</span> Warden · ⚔<span id="w-atk">0</span> ❤<span id="w-hp">0</span></div>
    <div id="xprow"><span id="xp-ic">⛏️</span><div id="xpbar"><div id="xpfill"></div></div><span id="xp-lvl">1</span></div>
    <div id="questtracker" onclick="panelQuests()"></div>
  </div>

  <div id="prompt"></div>

  <div id="dock">
    <div class="dbtn" data-p="bag"><span class="ti">🎒</span>Bag</div>
    <div class="dbtn" data-p="craft"><span class="ti">⚒️</span>Craft</div>
    <div class="dbtn" data-p="skills"><span class="ti">📊</span>Skills</div>
    <div class="dbtn" data-p="champs"><span class="ti">⚔️</span>Champs</div>
    <div class="dbtn" data-p="summon"><span class="ti">🌌</span>Summon</div>
    <div class="dbtn" data-p="menu"><span class="ti">☰</span>Menu</div>
  </div>

  <div id="toast"></div>
  <div id="modal"><div class="mbox" id="mbox"></div></div>
</div>
<script type="module" src="/src/game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
