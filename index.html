<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASTRARI">
<meta name="theme-color" content="#04060c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ASTRARI — Echoes of the Verdant Stars</title>
</head>
<body>
<div id="phone">
  <canvas id="game"></canvas>

  <div id="top">
    <div id="toprow">
      <div id="res">
        <div class="res"><canvas class="ric" data-ic="astral" width="34" height="34"></canvas><span id="r-astral">0</span></div>
        <div class="res"><canvas class="ric" data-ic="shard" width="34" height="34"></canvas><span id="r-shard">0</span></div>
        <div class="res"><canvas class="ric" data-ic="ore" width="34" height="34"></canvas><span id="r-ore">0</span></div>
        <div class="res"><canvas class="ric" data-ic="wood" width="34" height="34"></canvas><span id="r-wood">0</span></div>
      </div>
      <div id="envbox"><b id="env-time">Dawn</b><br><span id="env-weather">Clear</span><br><span id="env-day">Day 1</span></div>
    </div>
    <div id="wardenbar"><span class="lvl" id="w-lvl">Lv 1</span> Warden · ⚔<span id="w-atk">0</span> ❤<span id="w-hp">0</span></div>
    <div id="xprow"><span id="xp-ic">⛏️</span><div id="xpbar"><div id="xpfill"></div></div><span id="xp-lvl">1</span></div>
    <div id="expbar"></div>
    <div id="questtracker" onclick="panelQuests()"></div>
  </div>

  <div id="prompt"></div>

  <div id="dock">
    <div class="dbtn" data-p="bag"><canvas class="ti" data-icon="bag" width="48" height="48"></canvas>Bag</div>
    <div class="dbtn" data-p="craft"><canvas class="ti" data-icon="craft" width="48" height="48"></canvas>Craft</div>
    <div class="dbtn" data-p="skills"><canvas class="ti" data-icon="skills" width="48" height="48"></canvas>Skills</div>
    <div class="dbtn" data-p="champs"><canvas class="ti" data-icon="champs" width="48" height="48"></canvas>Champs</div>
    <div class="dbtn" data-p="summon"><canvas class="ti" data-icon="summon" width="48" height="48"></canvas>Summon</div>
    <div class="dbtn" data-p="menu"><canvas class="ti" data-icon="menu" width="48" height="48"></canvas>Menu</div>
  </div>

  <div id="toast"></div>
  <div id="modal"><div class="mbox" id="mbox"></div></div>

  <div id="dlg">
    <div id="dlg-port"><canvas id="dlg-pc" width="132" height="132"></canvas></div>
    <div id="dlg-box">
      <div id="dlg-name"></div>
      <div id="dlg-text"></div>
      <div id="dlg-choices"></div>
      <div id="dlg-adv">▼ tap</div>
    </div>
  </div>
  <div id="vision"><div id="vision-stage"><canvas id="vision-cv" width="260" height="220"></canvas></div><div id="vision-cap"></div><div id="vision-adv">tap to continue</div></div>
</div>
<script type="module" src="/src/game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
